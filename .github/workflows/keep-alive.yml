name: Keep Render backend alive

# HALTED: the schedule trigger is commented out below, so this no longer runs automatically —
# only a manual "Run workflow" from the Actions tab will fire it. To resume automatic pinging,
# uncomment the `schedule` block.
#
# Render's free tier spins the service down after ~15 min of inactivity, and the next request
# pays a 30-60+ second cold-start penalty — pinging the health endpoint every 10 minutes keeps it
# warm. Note: GitHub disables scheduled workflows automatically after 60 days with no repo commits
# — if pings stop, push any commit (or re-enable the workflow from the Actions tab) to resume them.
# Also worth knowing: keeping a free service always-on this way uses close to the entire monthly
# free instance-hour quota on Render (a 24/7 service is ~730 hours; the free plan's shared quota is
# 750) — fine for a single service, but leaves little headroom if other free Render services exist
# on the same account.

on:
  # schedule:
  #   - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: curl -sf https://ida-voting-server.onrender.com/api/health
