services:
  - type: web
    name: ida-voting-server
    runtime: node
    rootDir: server
    # Free tier for now — no card required, but the service spins down after ~15 min idle and
    # cold-starts (30-60+s) on the next request. Switch to `starter` before the real election goes
    # live (a voter hitting a sleeping backend mid-vote would be a bad time to find out).
    plan: free
    # --include=dev: NODE_ENV=production (below) makes plain `npm install` skip devDependencies,
    # but tsc needs typescript + every @types/* package to actually type-check the build. This is
    # a build-only container on Render's native Node runtime (not a separate build/run split), so
    # devDependencies sitting unused in node_modules afterward costs nothing.
    buildCommand: npm install --include=dev && npm run build
    # migrate deploy only applies pending migrations, and db seed upserts the bootstrap admin by
    # email (see prisma/seed.ts) — both are safe/idempotent to run on every deploy, not just the
    # first one. db seed only sets the password at creation time, though: changing
    # SEED_ADMIN_PASSWORD after the account already exists won't retroactively update it — use the
    # app's own Forgot Password flow for that instead.
    startCommand: npx prisma migrate deploy && npx prisma db seed && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TOKEN_ENCRYPTION_KEY
        sync: false
      - key: VOTING_LINK_BASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: COOKIE_SAME_SITE
        sync: false
      - key: DEFAULT_ELECTION_TITLE
        sync: false
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_NAME
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PHOTOS_BUCKET
        sync: false
